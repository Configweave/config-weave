# The test stack: weave-server + the config-weave-pipeline daemon +
# Prometheus (metrics) + Loki (logs). `just stack-up` / `just stack-down`;
# build the weave-server image first with `just docker-build` (compose
# can't build it — the Dockerfile assembles host-prebuilt dist/ artifacts,
# and the pipeline daemon runs from that same image).
#
# The per-service Monitoring/Logs tabs query the backends through the
# server (PROMETHEUS_URL / LOKI_URL below); Prometheus scrapes
# weave-server's /metrics, weave-server pushes its logs to Loki. The
# Pipelines section proxies to the daemon (PIPELINE_URL below).
services:
  weave-server:
    image: weave-server
    # Test stack on a trusted host — no login. The Dockerfile entrypoint
    # already binds 0.0.0.0.
    command: ["--no-auth"]
    ports:
      - "8765:8765"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      # The daemon runs --no-auth on this trusted network, so the proxy
      # needs no machine token (no PIPELINE_TOKEN).
      PIPELINE_URL: http://weave-pipeline:8770
    volumes:
      # Testlab containers are siblings on the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./testdata:/runbooks
    depends_on:
      - prometheus
      - loki
      - weave-pipeline

  # The CI/CD daemon, from the same image with the pipeline entrypoint.
  # --no-auth because this is a trusted test network (a non-loopback bind
  # otherwise requires --forge-issuer). Play steps resolve `playbook`
  # names under /runbooks and shell out to the bundled config-weave CLI.
  weave-pipeline:
    image: weave-server
    entrypoint: ["config-weave-pipeline"]
    command:
      ["--dir", "/pipelines", "--playbooks-dir", "/runbooks", "--bind", "0.0.0.0", "--no-auth"]
    ports:
      - "8770:8770"
    volumes:
      - ./pipeline/testdata/pipelines:/pipelines
      - ./testdata:/runbooks

  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus

  loki:
    image: grafana/loki:3.5.3
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

volumes:
  prom-data:
  loki-data:
