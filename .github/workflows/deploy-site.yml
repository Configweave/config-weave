name: Deploy Site

# Builds the config-weave docs/landing site (docs/main.wcl -> docs/_site) with
# the `wcl` CLI and deploys it to Cloudflare Pages (project "config-weave",
# configured in wrangler.toml). `wcl` lives in the sibling WCL repo, which is
# not checked out here, so we fetch a prebuilt release binary via the WCL
# project's install script (https://wcl.dev/install.sh). Runs only when docs/
# (or this workflow) change on main, so an ordinary code push doesn't trigger a
# deploy.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-site.yml'
      - 'wrangler.toml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Install wcl CLI
        # WCL is pre-release-only for now, so --pre. install.sh drops the
        # binary in ~/.local/bin, which isn't on PATH by default — export it.
        run: |
          curl -fsSL https://wcl.dev/install.sh | sh -s -- --pre
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build docs site
        run: wcl wdoc build docs/main.wcl --out docs/_site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy
